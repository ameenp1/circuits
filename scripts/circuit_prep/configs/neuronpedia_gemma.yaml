# Neuronpedia graph prompts — circuit preparation for Gemma 2 2B (base model).
# Dataset module: scripts/circuit_prep/data/neuronpedia.py (regenerate the prompts
# with: python custom_automation/fetch_neuronpedia_prompts.py).
dataset: neuronpedia
output_path: results/case_studies/neuronpedia_circuit.pkl
model-id: google/gemma-2-2b
# Pruning: mimic neuronpedia / circuit-tracer cumulative-influence pruning — keep the
# smallest set of neurons that together cover this fraction of total attribution mass.
# 0.7 matches neuronpedia's pruning threshold. This governs pruning; when it is set,
# percentage_threshold is ignored (model-agnostic 0..1 scale, so no Gemma rescaling needed).
node_attribution_threshold: 0.7
# These prompts are short (<= ~12 tokens). On a 24 GB GPU (RTX 4090) you can trace the
# whole set in ~2 batches — set this to 8 (or up to 15 for all-at-once). Lower to 1-2
# only on a small card or if you hit OOM.
batch_size: 8
k: 5
verbose: true
